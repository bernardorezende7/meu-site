<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <header>
        <h1>Formulário de Cadastro</h1>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="form.html">Formulário</a></li>
                <li><a href="formAction.html">Dados Enviados</a></li>
                <li><a href="about.html">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Preencha seus dados</h2>
            <form id="cadastroForm" action="formAction.html" method="GET" onsubmit="return validarFormulario()">
                <div class="campo">
                    <label for="nome">Nome completo:</label><br>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label><br>
                    <input type="email" id="email"  name="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="campo">
                    <label for="idade">Idade:</label><br>
                    <input type="number" id="idade" name="idade" min="1" max="120" placeholder="idade" required>
                </div>

                <div class="campo">
                    <label for="mensagem">Mensagem:</label><br>
                    <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva algo..." required></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 - Criado por Bernardo Rezende</p>
    </footer>
</body>
</html>
